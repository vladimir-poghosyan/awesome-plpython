services:
  postgres:
    build: .
    security_opt:
      - no-new-privileges:true
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: awesome-plpython
    volumes:
      - ./db-startup.sh:/docker-entrypoint-initdb.d/db-startup.sh:ro
      - ./scripts:/var/opt/scripts:ro
    ports:
      - "8080:8080"
